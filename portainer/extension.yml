name: portainer
version: 1.0.0
description: Portainer CE как docker-контейнер под systemd.
os:
  - debian: ">=11"
  - ubuntu: ">=22.04"
depends:
  - docker
params:
  PORTAINER_PORT:
    default: "9443"
    description: HTTPS-порт UI Portainer.
  PORTAINER_IMAGE:
    default: portainer/portainer-ce:latest
    description: Docker-образ Portainer.
