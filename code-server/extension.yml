name: code-server
version: 1.0.0
description: VS Code в браузере (code-server) как systemd-сервис.
os:
  - debian: ">=11"
  - ubuntu: ">=22.04"
depends: []
params:
  CODE_SERVER_USER:
    default: debian
    description: Пользователь, под которым включается сервис code-server@.
  CODE_SERVER_VERSION:
    default: ""
    description: Версия code-server (пусто = последняя).
